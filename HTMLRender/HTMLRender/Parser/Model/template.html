<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Helvetica,Arial,sans-serif;
    font-size:16px;
    color:#222;
    margin:20px;
    line-height:1.6;
}

h1{
    font-size:28px;
    margin-bottom:5px;
}

h2{
    font-size:22px;
    margin-top:25px;
    margin-bottom:10px;
}

h3{
    font-size:19px;
    margin-top:20px;
}

h4{
    font-size:17px;
    margin-top:15px;
}

p{
    margin:8px 0;
}

ol{
    padding-left:30px;
}

ul{
    padding-left:25px;
}

li{
    margin:6px 0;
}

table{
    width:100%;
    border-collapse:collapse;
    margin:15px 0;
}

th{
    background:#eeeeee;
    border:1px solid #999;
    padding:8px;
    text-align:left;
}

td{
    border:1px solid #999;
    padding:8px;
}

.note{
    border-left:4px solid orange;
    background:#fff9e6;
    padding:10px;
    margin:12px 0;
}

.warning{
    border-left:4px solid red;
    background:#ffecec;
    padding:10px;
}

.reference{
    color:#0066cc;
    text-decoration:underline;
}

.collapsible{

    cursor:pointer;
    font-weight:bold;
}

.content{

    margin-left:20px;
}

.hidden{

    display:none;
}

</style>

</head>

<body>

{{CONTENT}}

<script>

function toggle(id){

    var element=document.getElementById(id);

    if(element.classList.contains("hidden"))
        element.classList.remove("hidden");
    else
        element.classList.add("hidden");
}

</script>

</body>

</html>
